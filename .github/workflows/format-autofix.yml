# Applies dotnet format (EditorConfig + analyzers) and pushes a commit only when something changed.
# Same check as the Format job in ci.yml, but mutating instead of --verify-no-changes.

name: Format autofix

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

concurrency:
  group: format-autofix-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-format:
    runs-on: ubuntu-latest
    # Fork PRs cannot receive pushes from this repo's GITHUB_TOKEN.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Rex.sln

      - name: Apply formatting
        run: dotnet format Rex.sln --no-restore

      - name: Commit and push when fixes exist
        shell: bash
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          if git diff --cached --quiet; then
            echo "No formatting changes. Working tree matches EditorConfig and analyzer fixes."
            exit 0
          fi
          git commit -m "Apply dotnet format"
          git push origin "HEAD:${BRANCH}"
